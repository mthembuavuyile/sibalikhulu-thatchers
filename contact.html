<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Sibalikhulu Thatchers</title>
  <meta name="description" content="Get in touch with Sibalikhulu Thatchers for a free quote on rondavels, lapas, gazebos, and thatched structures in KwaZulu-Natal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>

  <main>

    <section class="contact-wrap">
      <div class="contact-info">
        <p class="section-label">Let's Talk</p>
        <h1>Get In Touch</h1>
        <p class="contact-intro">Ready to start your thatching project? Reach out for a free consultation and no-obligation quote.</p>

        <ul class="contact-details">
          <li>
            <span class="detail-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l1.17-.93a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
            </span>
            <div>
              <strong>Phone</strong>
              <span>+27 70 704 9514</span>
            </div>
          </li>
          <li>
            <span class="detail-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <div>
              <strong>Email</strong>
              <span>sibalikhuluthatchers@gmail.com</span>
            </div>
          </li>
          <li>
            <span class="detail-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </span>
            <div>
              <strong>Location</strong>
              <span>KwaZulu-Natal, South Africa</span>
            </div>
          </li>
        </ul>
      </div>

      <div class="contact-form-wrap">
        <form class="contact-form" action="#" method="POST" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" placeholder="+27 00 000 0000">
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="service">Service Required</label>
            <select id="service" name="service">
              <option value="" disabled selected>Select a service…</option>
              <option>Rondavel Construction</option>
              <option>Lapa / Gazebo</option>
              <option>New Build</option>
              <option>Maintenance &amp; Repairs</option>
              <option>Lodge / Commercial</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message / Project Details</label>
            <textarea id="message" name="message" rows="5" placeholder="Tell us about your project…" required></textarea>
          </div>
          <button type="submit" class="btn submit-btn">Send Message</button>
        </form>
      </div>
    </section>

  </main>

  <script src="js/layout.js"></script>
</body>
</html>
